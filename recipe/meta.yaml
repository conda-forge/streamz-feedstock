{% set org = "python-streamz" %}
{% set name = "streamz" %}
{% set version = "0.6.6" %}
{% set sha256 = "b72e55177bcd3c46608a0bcfb630bff43485ac6f1c0550586d2b5ead23901f10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - zict
    - tornado
    - toolz
    - setuptools
    - six

test:
  requires:
    - python {{ python_min }}
  imports:
    - streamz
    - streamz.core

about:
  home: https://github.com/python-streamz/streamz/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Manage streaming data, optionally with Dask and Pandas

  description: |
    Manage streaming data, optionally with Dask and Pandas
  doc_url: https://streamz.readthedocs.io/en/latest/
  dev_url: https://github.com/python-streamz/streamz/

extra:
  recipe-maintainers:
    - CJ-Wright
    - mrocklin
    - jrmlhermitte
    - mariusvniekerk
    - martindurant
